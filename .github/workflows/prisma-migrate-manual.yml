name: Prisma Manual Migration

on:
  workflow_dispatch:
    inputs:
      name:
        description: "Migration name"
        required: true
        default: "manual"

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Run Prisma migrate dev
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}
        run: npm run prisma:migrate -- --name ${{ inputs.name }}
